name: Build & Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Build scoped vendor
        run: composer run -n scoper:build

      - name: Lint PHP
        run: |
          php -l functions.php
          php -l src/Core/Carbon.php
          php -l src/ThemeOptions/General.php
          php -l src/ThemeOptions/SocialLinks.php

      - name: Build theme zip
        run: ARS_DIST_ZIP_NAME="a-ripple-song.zip" composer run -n build:dist -- "${GITHUB_REF_NAME}"

      - name: Remove old versioned zips
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = context.ref.replace('refs/tags/', '');

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });

              for (const asset of release.assets ?? []) {
                if (asset.name === 'a-ripple-song.zip') continue;
                if (asset.name.startsWith('a-ripple-song-') && asset.name.endsWith('.zip')) {
                  core.info(`Deleting asset: ${asset.name}`);
                  await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
                }
              }
            } catch (e) {
              core.info(`No existing release for tag ${tag} (or unable to fetch).`);
            }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/a-ripple-song.zip
          prerelease: ${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-') }}
