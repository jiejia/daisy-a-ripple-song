name: Build & Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish or clean, e.g. v0.5.0."
        required: false
        type: string

env:
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Build scoped vendor
        run: composer run -n scoper:build

      - name: Lint PHP
        run: |
          php -l functions.php
          find src -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Build theme zip
        run: ARS_DIST_ZIP_NAME="daisy-a-ripple-song.zip" composer run -n build:dist -- "${RELEASE_TAG}"

      - name: Remove old versioned zips
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });

              for (const asset of release.assets ?? []) {
                if (asset.name === 'daisy-a-ripple-song.zip') continue;
                if (
                  asset.name === 'a-ripple-song.zip'
                  || (asset.name.startsWith('a-ripple-song-') && asset.name.endsWith('.zip'))
                  || (asset.name.startsWith('daisy-a-ripple-song-') && asset.name.endsWith('.zip'))
                ) {
                  core.info(`Deleting asset: ${asset.name}`);
                  await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
                }
              }
            } catch (e) {
              core.info(`No existing release for tag ${tag} (or unable to fetch).`);
            }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: build/daisy-a-ripple-song.zip
          prerelease: ${{ contains(inputs.release_tag || github.ref_name, '-') }}

      - name: Remove obsolete release assets
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });

            for (const asset of release.assets ?? []) {
              if (
                asset.name === 'a-ripple-song.zip'
                || (asset.name.startsWith('a-ripple-song-') && asset.name.endsWith('.zip'))
              ) {
                core.info(`Deleting obsolete asset: ${asset.name}`);
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: asset.id });
              }
            }
